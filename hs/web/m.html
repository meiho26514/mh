<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美和科大智慧預約系統</title>

    <link rel="icon" href="Logo.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="m.css">
</head>

<body class="bg-vibrant-gradient min-h-screen">

    <section id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div
            class="login-card p-10 rounded-[3rem] shadow-2xl bg-white/95 w-full max-w-[500px] border-b-8 border-[#3366CC]">
            <div class="mb-10 text-center">
                <h1 class="text-3xl font-black text-[#3366CC] mb-2">美和科技大學</h1>
                <p class="text-[#FF9933] font-bold text-3xl">資科系教室預約系統</p>
            </div>
            <div class="space-y-6">
                <div class="relative group">
                    <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="stuId" class="input-modern pl-12"
                        placeholder="請輸入員工編號/學號 Staff or Student ID">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="stuPwd" class="input-modern pl-12" placeholder="請輸入密碼 Password">
                </div>
                <div class="flex items-center space-x-4">
                    <input type="text" id="captchaInput" class="input-modern w-1/2" placeholder="驗證碼">
                    <div class="relative w-1/2 h-[50px] bg-gray-100 rounded-2xl flex items-center justify-center cursor-pointer"
                        onclick="generateCaptcha()">
                        <div id="captchaBox" class="captcha-complex"></div>
                    </div>
                </div>
                <div class="flex items-center justify-between px-2">
                    <div class="flex items-center">
                        <input type="checkbox" id="keepLogin" class="w-5 h-5 accent-[#3366CC] cursor-pointer">
                        <label for="keepLogin"
                            class="ml-2 text-slate-600 font-bold cursor-pointer select-none">保持登入狀態</label>
                    </div>
                    <a href="javascript:void(0)" onclick="showForgotModal()"
                        class="text-[#3366CC] font-bold hover:underline text-sm">忘記密碼？</a>
                </div>

                <button onclick="handleLogin()"
                    class="btn-vibrant w-full py-4 text-2xl font-black shadow-xl">登入</button>

                <p class="text-center mt-4 font-bold text-slate-500">
                    還沒有帳號？ <a href="javascript:void(0)" onclick="showRegisterModal()"
                        class="text-[#3366CC] hover:underline">立即註冊</a>
                </p>
            </div>
        </div>
    </section>

    <div id="registerModal" class="modal-overlay hidden">
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl max-w-md w-11/12 animate-pop border-b-8 border-[#FF9933]">
            <h2 class="text-3xl font-black text-[#3366CC] text-center mb-1">建立新帳號</h2>
            <p class="text-slate-400 font-bold text-center mb-5">請填寫基本資料完成註冊</p>

            <div class="space-y-3">
                <input type="text" id="regId" class="input-modern py-3" placeholder="學號 (登入帳號)">
                <input type="text" id="regName" class="input-modern py-3" placeholder="姓名">
                <input type="text" id="regClass" class="input-modern py-3" placeholder="請輸入班級">
                <input type="email" id="regEmail" class="input-modern py-3" placeholder="請輸入電子郵件">

                <div class="flex gap-3">
                    <button id="genderM" onclick="setRegGender('男')"
                        class="flex-1 py-2.5 rounded-2xl font-bold border-2 border-gray-100 bg-gray-50 text-gray-500">男</button>
                    <button id="genderF" onclick="setRegGender('女')"
                        class="flex-1 py-2.5 rounded-2xl font-bold border-2 border-gray-100 bg-gray-50 text-gray-500">女</button>
                </div>

                <input type="password" id="regPwd" class="input-modern py-3" placeholder="請設定密碼">

                <button onclick="handleRegister()"
                    class="btn-vibrant w-full py-3.5 text-xl font-black mt-2">確認註冊</button>
                <button onclick="closeRegisterModal()" class="w-full text-gray-400 font-bold text-sm mt-1">返回登入</button>
            </div>
        </div>
    </div>

    <div id="forgotModal" class="modal-overlay hidden">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-11/12 animate-pop border-b-8 border-gray-400">
            <h2 class="text-2xl font-black text-[#3366CC] text-center mb-6">重設密碼</h2>
            <div id="forgotStep1" class="space-y-4">
                <input type="text" id="forgotId" class="input-modern" placeholder="請輸入學號">
                <input type="email" id="forgotEmail" class="input-modern" placeholder="請輸入註冊時的電子郵件">
                <button onclick="verifyForgot()" class="btn-vibrant w-full py-4 font-black">驗證身份</button>
            </div>
            <div id="forgotStep2" class="space-y-4 hidden">
                <input type="password" id="newPwd" class="input-modern" placeholder="請設定新密碼">
                <button onclick="resetPassword()" class="btn-vibrant w-full py-4 font-black">更新密碼</button>
            </div>
            <button onclick="closeForgotModal()" class="w-full mt-4 text-gray-400 font-bold">取消</button>
        </div>
    </div>

    <section id="mainPage" class="hidden">
        <header
            class="header-glass px-4 md:px-8 py-4 flex justify-between items-center sticky top-0 z-50 border-b-4 border-[#3366CC]/20">
            <div class="flex items-center gap-3">
                <img src="Logo.png" alt="學校Logo" class="w-14 h-14 object-contain">
                <div class="flex flex-col leading-tight">
                    <h2 class="text-xl font-black text-[#3366CC]">美和科技大學</h2>
                    <p class="text-lg font-black text-[#FF9933]">資科系教室預約系統</p>
                </div>
            </div>

            <div class="flex items-center space-x-3 md:space-x-4">
                <div class="text-right flex flex-col items-end mr-1">
                    <p id="navUserName" class="info-label-large font-black text-slate-700">姓名：</p>
                    <p id="navUserId" class="info-label-large font-black text-slate-700">學號：</p>
                </div>
                <div class="relative group" onclick="showProfile()">
                    <div
                        class="avatar-styled w-[75px] h-[75px] text-4xl cursor-pointer flex items-center justify-center border-4 border-white shadow-lg bg-yellow-50 overflow-hidden">
                        <span id="navAvatarIcon" class="banana-emoji">🍌</span>
                    </div>
                </div>
                <button onclick="handleLogout()" class="logout-btn-vibrant px-4 py-2 md:px-5 md:py-3 flex items-center">
                    <i class="fa-solid fa-right-from-bracket sm:mr-2"></i>
                    <span class="font-black hidden sm:inline">登出</span>
                </button>
            </div>
        </header>

        <div class="max-w-7xl mx-auto px-4 md:px-6 mt-8">
            <div
                class="flex flex-col lg:flex-row lg:items-center gap-6 mb-8 bg-white/50 p-6 rounded-[2rem] backdrop-blur-sm">
                <nav class="flex flex-wrap gap-2">
                    <button onclick="filterRooms('all', this)" class="nav-btn active">全部教室</button>
                    <button onclick="filterRooms('computer', this)" class="nav-btn">電腦教室</button>
                    <button onclick="filterRooms('meeting', this)" class="nav-btn">會議室</button>
                    <button onclick="filterRooms('normal', this)" class="nav-btn">普通教室</button>
                </nav>
                <div class="flex flex-wrap items-center gap-4 lg:border-l-2 lg:border-gray-300 lg:pl-6">
                    <div class="status-indicator"><span class="bg-[#2ecc71]"></span>可預約</div>
                    <div class="status-indicator"><span class="bg-[#e74c3c]"></span>已預定</div>
                    <div class="status-indicator"><span class="bg-[#FF9933]"></span>我的預約</div>
                </div>
                <button onclick="filterRooms('my', this)" class="nav-btn-my lg:ml-auto">
                    我的預約清單 <span id="myCount" class="bg-white text-[#FF9933] px-2 py-0.5 rounded-full ml-1">0</span>
                </button>
            </div>
            <main id="roomList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 pb-20"></main>
        </div>
    </section>

    <div id="profileModal" class="modal-overlay hidden">
        <div
            class="bg-white rounded-[3rem] shadow-2xl w-11/12 max-w-[450px] overflow-hidden animate-pop border-b-8 border-[#3366CC]">
            <div class="p-8 pb-4 flex flex-col items-center">
                <div class="relative w-28 h-28 mb-4 self-center">
                    <div id="profileImageDisplay"
                        class="w-full h-full bg-[#f1f5f9] rounded-3xl flex items-center justify-center text-6xl shadow-inner border-4 border-white overflow-hidden">
                        <span class="banana-emoji">🍌</span>
                    </div>
                    <button onclick="resetToDefaultAvatar()" title="換回預設"
                        class="absolute top-[-10px] left-[-10px] bg-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg border border-gray-100 z-10 hover:bg-gray-50">
                        <i class="fa-solid fa-rotate-left text-[#3366CC] text-lg"></i>
                    </button>
                    <label for="imageUpload"
                        class="absolute bottom-[-5px] right-[-5px] bg-[#3366CC] w-10 h-10 rounded-full flex items-center justify-center shadow-lg cursor-pointer border-2 border-white">
                        <i class="fa-solid fa-camera text-white text-sm"></i>
                    </label>
                    <input type="file" id="imageUpload" class="hidden" accept="image/*" onchange="previewImage(this)">
                </div>
                <h3 class="text-[#3366CC] text-3xl font-black text-center">學生個人檔案</h3>
                <p class="text-slate-400 font-bold mb-6 text-center">Student Personal Profile</p>
            </div>

            <div class="px-8 pb-4">
                <div class="p-6 bg-slate-50/80 rounded-[2rem] space-y-4 font-bold text-slate-600">
                    <div class="flex items-center gap-2 border-b border-slate-200 pb-2">
                        <span class="text-lg text-[#3366CC] font-black whitespace-nowrap w-12">姓名:</span>
                        <input type="text" id="editName"
                            class="bg-transparent border-none focus:outline-none text-sm text-slate-800 font-bold flex-1 text-left"
                            readonly>
                    </div>

                    <div class="flex items-center gap-2 border-b border-slate-200 pb-2">
                        <span class="text-lg text-[#3366CC] font-black whitespace-nowrap w-12">學號:</span>
                        <input type="text" id="editId"
                            class="bg-transparent border-none focus:outline-none text-sm text-slate-800 font-bold flex-1 text-left"
                            readonly>
                    </div>

                    <div class="flex items-center gap-2 border-b border-slate-200 pb-2">
                        <span class="text-lg text-[#3366CC] font-black whitespace-nowrap w-12">班級:</span>
                        <input type="text" id="editClass"
                            class="bg-transparent border-none focus:outline-none text-sm text-slate-800 font-bold flex-1 text-left"
                            readonly>
                    </div>

                    <div class="flex items-center gap-2 border-b border-slate-200 pb-2">
                        <span class="text-lg text-[#3366CC] font-black whitespace-nowrap w-12">性別:</span>
                        <span id="displayGender"
                            class="inline-block text-sm text-slate-800 font-bold flex-1 text-left"></span>
                    </div>

                    <div class="flex items-center gap-2 border-b border-slate-200 pb-2">
                        <span class="text-lg text-[#3366CC] font-black whitespace-nowrap w-12.5">Email:</span>
                        <input type="text" id="editEmail"
                            class="bg-transparent border-none focus:outline-none text-sm text-slate-800 font-bold flex-1 text-left"
                            readonly>
                    </div>
                </div>
            </div>

            <div class="p-8 pt-2 flex flex-col gap-3">
                <div class="flex gap-2">
                    <button id="editProfileBtn" onclick="toggleEditProfile(true)"
                        class="flex-1 py-3.5 bg-gray-100 rounded-2xl font-black hover:bg-gray-200 transition-colors">編輯檔案</button>
                    <button id="pwdToggleBtn" onclick="openPwdModal()"
                        class="flex-1 py-3.5 bg-slate-800 text-white rounded-2xl font-black hover:bg-black transition-colors">變更密碼</button>
                </div>
                <button id="saveProfileBtn" onclick="saveProfileChanges()"
                    class="w-full py-3.5 bg-[#2ecc71] text-white rounded-2xl font-black hidden shadow-lg">保存修改</button>
                <button onclick="closeProfile()"
                    class="w-full py-3.5 bg-[#FF9933] text-white rounded-2xl font-black shadow-lg">返回首頁</button>
            </div>
        </div>
    </div>

    <div id="passwordModal" class="modal-overlay hidden">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-11/12 animate-pop border-b-8 border-slate-800">
            <h2 class="text-3xl font-black text-slate-800 text-center mb-2">安全設定</h2>
            <p class="text-slate-400 font-bold text-center mb-8">重設您的帳戶密碼</p>
            <div class="space-y-5">
                <div class="flex flex-col border-b-2 border-slate-100 pb-2">
                    <span class="text-sm text-[#FF9933] font-black mb-1">設定新密碼 New Password</span>
                    <input type="password" id="editPwd"
                        class="bg-transparent border-none focus:outline-none text-xl text-slate-800"
                        placeholder="請設定新密碼">
                </div>
                <button onclick="saveProfileChanges(true)"
                    class="btn-vibrant w-full py-4 text-xl font-black mt-4">確認變更</button>
                <button onclick="closePwdModal()" class="w-full text-gray-400 font-bold">取消返回</button>
            </div>
        </div>
    </div>

    <div id="bookingModal" class="modal-overlay hidden">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-11/12 animate-pop">
            <h2 id="modalTitle" class="text-3xl font-black text-[#3366CC] text-center mb-2"></h2>
            <p id="modalId" class="text-[#FF9933] font-black text-center mb-4"></p>

            <div class="bg-slate-50 border-t-2 border-slate-100 p-5 mb-6 rounded-2xl">
                <p class="text-sm font-black text-center flex flex-col gap-2">
                    <span class="text-red-500 text-xl block mb-1">注意！</span>

                    <span class="text-amber-600">即日起開放預約一個月內</span>
                    <span class="text-amber-600">預約時間為早上7點後到晚上22點前</span>
                    <span class="text-amber-600">預約時間請至少滿 15 分鐘</span>
                </p>
            </div>

            <div class="mb-5">
                <label class="text-xs font-black text-slate-400 ml-1">預約日期</label>
                <input type="date" id="bookingDate" class="input-modern">
            </div>
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-black text-slate-400 ml-1">開始</label><input type="time"
                            id="startTime" class="input-modern" value="08:00"></div>
                    <div><label class="text-xs font-black text-slate-400 ml-1">結束</label><input type="time" id="endTime"
                            class="input-modern" value="09:00"></div>
                </div>
                <button onclick="confirmBooking()" class="btn-vibrant w-full py-4 text-xl font-black">確認送出</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold">返回取消</button>
            </div>
        </div>
    </div>

    <div id="successModal" class="modal-overlay hidden">
        <div
            class="bg-white p-10 rounded-[3rem] shadow-2xl text-center w-11/12 max-w-sm animate-pop border-t-8 border-green-500">
            <div class="success-icon-container mx-auto mb-8">
                <div class="check-circle bg-green-500">
                    <i class="fa-solid fa-check text-5xl text-white"></i>
                </div>
            </div>
            <h2 id="successTitle" class="text-3xl font-black text-slate-800 mb-3">操作成功</h2>
            <p id="successMessage" class="text-slate-500 font-bold mb-10"></p>
            <button onclick="closeSuccess()"
                class="btn-success-close w-full py-4 text-xl font-black rounded-2xl">確認</button>
        </div>
    </div>

    <div id="errorModal" class="modal-overlay hidden">
        <div
            class="bg-white p-10 rounded-[3rem] shadow-2xl text-center w-11/12 max-w-sm animate-pop border-t-8 border-red-500">
            <div class="mx-auto mb-6 w-20 h-20 bg-red-100 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-xmark text-4xl text-red-500"></i>
            </div>
            <h2 id="errorTitle" class="text-2xl font-black text-slate-800 mb-2">操作失敗</h2>
            <p id="errorMessage" class="text-red-500 font-bold mb-8"></p>
            <button onclick="closeError()"
                class="w-full py-4 bg-slate-800 text-white text-xl font-black rounded-2xl">重新輸入</button>
        </div>
    </div>

    <div id="cancelConfirmModal" class="modal-overlay hidden">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl text-center w-11/12 max-w-sm animate-pop">
            <div class="mx-auto mb-6 w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-trash-can text-3xl text-orange-500"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">確定要取消預約？</h2>
            <p class="text-slate-500 font-bold mb-8 text-lg">取消後時段將釋放給他人</p>
            <div class="flex gap-4">
                <button onclick="closeCancelModal()"
                    class="flex-1 py-4 bg-gray-100 text-gray-500 font-black rounded-2xl text-lg">放棄</button>
                <button id="finalCancelBtn"
                    class="flex-1 py-4 bg-red-500 text-white font-black rounded-2xl shadow-lg text-xl">確認取消</button>
            </div>
        </div>
    </div>

    <script src="m.js"></script>
</body>

</html>
