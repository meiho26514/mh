<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美和科大智慧預約系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-vibrant-gradient min-h-screen">

    <section id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="login-card p-10 rounded-[3rem] shadow-2xl bg-white/95 w-full max-w-[500px] border-b-8 border-[#3366CC]">
            <div class="mb-10 text-center">
                <h1 class="text-3xl font-black text-[#3366CC] mb-2">美和科技大學</h1>
                <p class="text-[#FF9933] font-bold text-3xl">資科系教室預約系統</p>
            </div>
            <div class="space-y-6">
                <div class="relative group">
                    <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="stuId" class="input-modern pl-12" placeholder="請輸入員工編號/學號 Staff or Student ID">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="stuPwd" class="input-modern pl-12" placeholder="請輸入密碼 Password">
                </div>
                <div class="flex items-center space-x-4">
                    <input type="text" id="captchaInput" class="input-modern w-1/2" placeholder="驗證碼">
                    <div class="relative w-1/2 h-[50px] bg-gray-100 rounded-2xl flex items-center justify-center cursor-pointer" onclick="generateCaptcha()">
                        <div id="captchaBox" class="captcha-complex"></div>
                    </div>
                </div>
                <div class="flex items-center px-2">
                    <input type="checkbox" id="keepLogin" class="w-5 h-5 accent-[#3366CC] cursor-pointer">
                    <label for="keepLogin" class="ml-2 text-slate-600 font-bold cursor-pointer select-none">保持登入狀態</label>
                </div>
                <button onclick="handleLogin()" class="btn-vibrant w-full py-4 text-2xl font-black shadow-xl">登入</button>
            </div>
        </div>
    </section>

    <section id="mainPage" class="hidden">
        <header class="header-glass px-4 md:px-8 py-4 flex justify-between items-center sticky top-0 z-50 border-b-4 border-[#3366CC]/20">
            <div class="flex flex-col items-start leading-tight">
                <h2 class="text-xl font-black text-[#3366CC]">美和科技大學</h2>
                <p class="text-xl font-black text-[#FF9933]">資科系教室預約系統</p>
            </div>

            <div class="flex items-center space-x-3 md:space-x-4">
                <div class="text-right hidden sm:flex flex-col items-end">
                    <p class="info-label-large font-black text-slate-700">姓名：香蕉</p>
                    <p class="info-label-large font-black text-slate-700">學號：1234</p>
                </div>
                <div class="relative group" onclick="showProfile()">
                    <div class="avatar-styled w-[75px] h-[75px] text-4xl cursor-pointer flex items-center justify-center border-4 border-white shadow-lg bg-yellow-50 overflow-hidden">
                        <span id="navAvatarIcon" class="banana-emoji">🍌</span>
                    </div>
                </div>
                <button onclick="handleLogout()" class="logout-btn-vibrant px-4 py-2 md:px-5 md:py-3 flex items-center">
                    <i class="fa-solid fa-right-from-bracket sm:mr-2"></i><span class="font-black hidden sm:inline">登出</span>
                </button>
            </div>
        </header>

        <div class="max-w-7xl mx-auto px-4 md:px-6 mt-8">
            <div class="flex flex-col lg:flex-row lg:items-center gap-6 mb-8 bg-white/50 p-6 rounded-[2rem] backdrop-blur-sm">
                <nav class="flex flex-wrap gap-2">
                    <button onclick="filterRooms('all', this)" class="nav-btn active">全部教室</button>
                    <button onclick="filterRooms('computer', this)" class="nav-btn">電腦教室</button>
                    <button onclick="filterRooms('meeting', this)" class="nav-btn">會議室</button>
                    <button onclick="filterRooms('normal', this)" class="nav-btn">普通教室</button>
                </nav>
                <div class="flex flex-wrap items-center gap-4 lg:border-l-2 lg:border-gray-300 lg:pl-6">
                    <div class="status-indicator"><span class="bg-[#2ecc71]"></span>可預約</div>
                    <div class="status-indicator"><span class="bg-[#e74c3c]"></span>已預定</div>
                    <div class="status-indicator"><span class="bg-[#FF9933]"></span>我的預約</div>
                </div>
                <button onclick="filterRooms('my', this)" class="nav-btn-my lg:ml-auto">
                    我的預約清單 <span id="myCount" class="bg-white text-[#FF9933] px-2 py-0.5 rounded-full ml-1">0</span>
                </button>
            </div>
            
            <main id="roomList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 pb-20"></main>
        </div>
    </section>

    <div id="profileModal" class="modal-overlay hidden">
        <div class="bg-white rounded-[3rem] shadow-2xl w-11/12 max-w-[450px] overflow-hidden animate-pop border-b-8 border-[#3366CC]">
            <div class="bg-[#3366CC] p-8 text-center">
                <div class="relative w-24 h-24 mx-auto mb-4 group">
                    <div id="profileImageDisplay" class="w-full h-full bg-white rounded-3xl flex items-center justify-center text-5xl shadow-xl overflow-hidden">
                        <span class="banana-emoji">🍌</span>
                    </div>
                    <label for="imageUpload" class="absolute bottom-[-10px] right-[-10px] bg-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg cursor-pointer hover:bg-gray-100 transition-all border-2 border-[#3366CC]">
                        <i class="fa-solid fa-camera text-[#3366CC]"></i>
                    </label>
                    <input type="file" id="imageUpload" class="hidden" accept="image/*" onchange="previewImage(this)">
                </div>
                <h3 class="text-white text-2xl font-black">學生個人檔案</h3>
            </div>
            <div class="p-8 space-y-4 font-bold text-slate-600">
                <div class="flex justify-between border-b pb-2"><span>姓名</span><span class="text-[#3366CC]">香蕉</span></div>
                <div class="flex justify-between border-b pb-2"><span>班級</span><span class="text-slate-800">日四技 資訊科技系 4年級1班</span></div>
                <div class="flex justify-between border-b pb-2"><span>學號</span><span class="text-slate-800">1234</span></div>
                <div class="flex justify-between border-b pb-2"><span>信箱</span><span class="text-slate-800">banana_meiho@edu.tw</span></div>
                <button onclick="closeProfile()" class="w-full py-4 bg-gray-100 rounded-2xl hover:bg-gray-200 transition-colors mt-4 font-black">關閉</button>
            </div>
        </div>
    </div>

    <div id="bookingModal" class="modal-overlay hidden">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-11/12 animate-pop">
            <h2 id="modalTitle" class="text-3xl font-black text-[#3366CC] text-center mb-2"></h2>
            <p id="modalId" class="text-[#FF9933] font-black text-center mb-4"></p>
            <div class="bg-red-50 border-l-4 border-red-500 p-3 mb-6">
                <p class="text-xs text-red-600 font-black"><i class="fa-solid fa-circle-exclamation mr-1"></i> 注意：預約時段最少需滿 15 分鐘，否則無法預約。</p>
            </div>
            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-black text-slate-400 ml-1">開始時間</label>
                        <input type="time" id="startTime" class="input-modern" value="08:00">
                    </div>
                    <div>
                        <label class="text-xs font-black text-slate-400 ml-1">結束時間</label>
                        <input type="time" id="endTime" class="input-modern" value="09:00">
                    </div>
                </div>
                <button onclick="confirmBooking()" class="btn-vibrant w-full py-4 text-xl font-black">確認送出</button>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold">返回取消</button>
            </div>
        </div>
    </div>

    <div id="successModal" class="modal-overlay hidden">
        <div class="bg-white/95 backdrop-blur-md p-10 rounded-[3.5rem] shadow-[0_30px_60px_-15px_rgba(0,0,0,0.3)] text-center max-w-sm w-11/12 animate-pop border-t-8 border-green-500">
            <div class="success-icon-container mx-auto mb-8">
                <div class="check-circle bg-green-500">
                    <i class="fa-solid fa-check text-5xl text-white"></i>
                </div>
                <div class="confetti-dot dot-1"></div>
                <div class="confetti-dot dot-2"></div>
                <div class="confetti-dot dot-3"></div>
            </div>
            <h2 class="text-3xl font-black text-slate-800 mb-3 tracking-tight">預約成功！</h2>
            <div class="space-y-1 mb-10">
                <p class="text-slate-500 font-bold">已為您保留教室時段</p>
                <p id="successRoomInfo" class="text-[#3366CC] font-black text-lg underline underline-offset-4 decoration-2"></p>
            </div>
            <button onclick="closeSuccess()" class="btn-success-close w-full py-4 text-xl font-black rounded-2xl">確認！</button>
        </div>
    </div>

    <div id="errorModal" class="modal-overlay hidden">
        <div class="bg-white/95 backdrop-blur-md p-10 rounded-[3.5rem] shadow-2xl text-center max-w-sm w-11/12 animate-pop border-t-8 border-red-500">
            <div class="mx-auto mb-6 w-20 h-20 bg-red-100 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-xmark text-4xl text-red-500"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">操作失敗</h2>
            <p id="errorMessage" class="text-red-500 font-bold mb-8"></p>
            <button onclick="closeError()" class="w-full py-4 bg-slate-800 text-white text-xl font-black rounded-2xl shadow-lg">重新輸入</button>
        </div>
    </div>

    <div id="cancelConfirmModal" class="modal-overlay hidden">
        <div class="bg-white p-10 rounded-[3.5rem] shadow-2xl text-center max-w-sm w-11/12 animate-pop">
            <div class="mx-auto mb-6 w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center">
                <i class="fa-solid fa-trash-can text-3xl text-orange-500"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">確定要取消預約？</h2>
            <p class="text-slate-500 font-bold mb-8 text-lg">取消後時段將釋放給他人</p>
            <div class="flex gap-4">
                <button onclick="closeCancelModal()" class="flex-1 py-4 bg-gray-100 text-gray-500 font-black rounded-2xl text-lg">放棄</button>
                <button id="finalCancelBtn" class="flex-1 py-4 bg-red-500 text-white font-black rounded-2xl shadow-lg shadow-red-200 text-xl">確認取消</button>
            </div>
        </div>
    </div>

    <script src="m.js"></script>
</body>
</html>
